<!DOCTYPE html>
<html>
<head>
    <title>Calculatrice</title>
    <link rel="stylesheet" href="styleCal.css">
</head>

<body>

<h1>Calculatrice</h1>

<input id="display" readonly>

<div class="buttons">

<button>7</button>
<button>8</button>
<button>9</button>
<button>/</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button>*</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button>-</button>

<button>0</button>
<button>.</button>
<button id="equals">=</button>
<button>+</button>

<button id="clear">C</button>

</div>

<script src="script.js"></script>

</body>
</html>
