<!DOCTYPE html>
<html>
<head>
    <title>Calculatrice Mat</title>
    <link rel="stylesheet" href="styleCal.css">
</head>

<body>
    <section id="calculator">
        <h1>CALCUL'APP</h1>
        <input id="monitor" readonly>
            <div class="buttons">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>0</button>
            <!--Les Opérateurs arithmétiques-->
            <button>/</button>
            <button>-</button>
            <button>+</button>
            <button>*</button>
            <button>.</button>
            <button id="egal">=</button>
            <button id="effac">C</button>
        </div>
        <script src="scriptCal.js"></script>
    </section>
</body>
</html>
